name: Deploy static site to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

# Only one concurrent deployment; skip runs queued behind an in-progress run.
concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-slim
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
                  cache: pip
                  cache-dependency-path: pyproject.toml

            - name: Install dependencies
              run: pip install .

            - name: Build static site
              run: python scripts/build_static.py
              env:
                  # Set BASE_URL to the repository sub-path for GitHub Pages.
                  # Override by setting the PAGES_BASE_URL repository variable
                  # (e.g. /my-fork-name) or leave vars.PAGES_BASE_URL unset to
                  # fall back to /lua_ardupilot_scripts.
                  BASE_URL: ${{ vars.PAGES_BASE_URL || '/lua_ardupilot_scripts' }}

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    deploy:
        needs: build
        runs-on: ubuntu-slim
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
