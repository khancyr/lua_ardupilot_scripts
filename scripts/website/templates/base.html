<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}ArduPilot Lua Community Scripts{% endblock %}</title>
    <link rel="icon" href="{{ base_url }}/static/img/ardupilot_logo.png" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="{{ base_url }}/static/style.css" />
</head>

<body class="d-flex flex-column bg-light" style="min-height:100vh">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ base_url }}/">
                <img src="{{ base_url }}/static/img/ardupilot_logo.png" alt="ArduPilot" height="24"
                    class="d-inline-block align-text-top" />
                <span class="ms-2">Lua Community Scripts</span>
            </a>
            <div class="d-flex flex-wrap gap-2">
                <a href="{{ base_url }}/scripts" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-collection me-1"></i>Browse
                </a>
                <a href="{{ base_url }}/contribute" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-code-slash me-1"></i>Contribute
                </a>
                <a href="{{ base_url }}/api-reference" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-braces me-1"></i>API
                </a>
                <a href="https://discuss.ardupilot.org/c/onboard-lua-scripting/156" target="_blank" rel="noopener"
                    class="btn btn-warning btn-sm rounded-pill">
                    <i class="bi bi-chat-dots me-1"></i>Forum
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="container-fluid d-flex text-bg-dark p-2 justify-content-between align-items-center mt-auto">
        <span class="small">Community repository for
            <a href="https://ardupilot.org" target="_blank" rel="noopener"
                style="color:#fff;text-decoration:underline">ArduPilot</a>
        </span>
        <a href="https://github.com/ArduPilot/lua_community_scripts" target="_blank" rel="noopener"
            style="color:#fff;text-decoration:underline" class="small">
            <i class="bi bi-github me-1"></i>Source on GitHub
        </a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>

</html>
