name: ardupilot-lua-scripts
region: fra # Frankfurt — change to nyc / ams / sgp as preferred

services:
  - name: web
    dockerfile_path: website/Dockerfile
    github:
      branch: test_do
      deploy_on_push: true
      repo: khancyr/lua_ardupilot_scripts
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5g # 512 MB RAM / 1 vCPU — ~$5/month
    health_check:
      http_path: /api/v1/health
      initial_delay_seconds: 10
      period_seconds: 30
    routes:
      - path: /
